services:
  postgres:
    image: postgres:16-alpine
    container_name: atelie-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atelie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./agendamento-backend
      dockerfile: Dockerfile
    container_name: atelie-backend
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/atelie?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@postgres:5432/atelie?schema=public"
      JWT_SECRET: "mude-para-uma-chave-segura-em-producao"
      PORT: "3333"
      FRONTEND_URL: "http://localhost:3000"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./agendamento-frontend
      dockerfile: Dockerfile
    container_name: atelie-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3333/api"
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  postgres_data:
